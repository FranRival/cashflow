<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cashflow MVP 3D</title>

<style>
body{
margin:0;
overflow:hidden;
background:#111;
font-family:Arial;
}

#ui{
position:absolute;
top:20px;
left:20px;
background:rgba(0,0,0,0.6);
padding:12px;
border-radius:8px;
color:white;
}

button{
padding:10px;
margin-top:8px;
font-size:16px;
}
</style>

</head>
<body>

<div id="ui">
<div>Turno: <span id="turn">Jugador 1</span></div>

<div>Dinero J1: $<span id="money1">5000</span></div>
<div>Pasivo J1: $<span id="passive1">0</span></div>
<div>Gastos J1: $<span id="expenses1">800</span></div>

<br>

<div>Dinero J2: $<span id="money2">5000</span></div>
<div>Pasivo J2: $<span id="passive2">0</span></div>
<div>Gastos J2: $<span id="expenses2">800</span></div>

<button onclick="rollDice()">Lanzar dado</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x202020);

const camera = new THREE.PerspectiveCamera(
60,
window.innerWidth/window.innerHeight,
0.1,
1000
);

let cameraAngle=0;
let cameraRadius=15;
let cameraHeight=5;

camera.position.set(0,cameraHeight,cameraRadius);
camera.lookAt(0,0,0);

window.addEventListener("mousemove",(e)=>{

cameraAngle=(e.clientX/window.innerWidth) * Math.PI*2;

camera.position.x=Math.cos(cameraAngle)*cameraRadius;
camera.position.z=Math.sin(cameraAngle)*cameraRadius;
camera.position.y=cameraHeight;

camera.lookAt(0,0,0);

});

const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

const light=new THREE.DirectionalLight(0xffffff,1);
light.position.set(10,20,10);
scene.add(light);

scene.add(new THREE.AmbientLight(0xffffff,0.5));

function tileColor(type){

switch(type){

case "payday": return "#2ecc71";
case "smallDeal": return "#3498db";
case "bigDeal": return "#9b59b6";
case "market": return "#f1c40f";
case "charity": return "#ffffff";
case "doodad": return "#e74c3c";

default: return "#555555";

}

}

function randomTileType(){

const r=Math.random();

if(r<0.2) return "payday";
if(r<0.45) return "smallDeal";
if(r<0.6) return "bigDeal";
if(r<0.75) return "market";
if(r<0.9) return "doodad";

return "charity";

}

function createTrapezoidGeometry(widthFront,widthBack,length,height){

const shape = new THREE.Shape();

shape.moveTo(-widthFront/2, -length/2);
shape.lineTo(widthFront/2, -length/2);
shape.lineTo(widthBack/2, length/2);
shape.lineTo(-widthBack/2, length/2);
shape.lineTo(-widthFront/2, -length/2);

const geometry = new THREE.ExtrudeGeometry(shape,{
depth:height,
bevelEnabled:false
});

geometry.rotateX(-Math.PI/2);

return geometry;

}

const tiles=[];
const tileTypes=[];

const tileWidth = 1.6
const tileLength = 3.2
const radius = 8;
const tileCount = 24;

for(let i=0;i<tileCount;i++){

const angle = (i / tileCount) * Math.PI * 2;

const x = Math.cos(angle) * radius;
const z = Math.sin(angle) * radius;

const type = randomTileType();

const geo = createTrapezoidGeometry(
tileWidth * 1.15,
tileWidth * 0.85,
tileLength,
0.5
);

/* TEXTURA CON NOMBRE */

const canvas=document.createElement("canvas");
canvas.width=512;
canvas.height=256;

const ctx=canvas.getContext("2d");

ctx.fillStyle=tileColor(type);
ctx.fillRect(0,0,512,256);

ctx.strokeStyle="black";
ctx.lineWidth=8;
ctx.strokeRect(0,0,512,256);

ctx.fillStyle="black";
ctx.font="bold 80px Arial";
ctx.textAlign="center";
ctx.textBaseline="middle";

ctx.fillText(type.toUpperCase(),256,190);

const texture=new THREE.CanvasTexture(canvas);
texture.flipY=false;

const mat = new THREE.MeshStandardMaterial({
map:texture,
emissive:0x000000,
emissiveIntensity:0.7
});



const tile = new THREE.Mesh(geo,mat);

tile.position.set(x,0,z);
tile.rotation.y = -angle + Math.PI/2;

scene.add(tile);

tiles.push(tile);
tileTypes.push(type);

}

function createPlayer(color){

const geo=new THREE.SphereGeometry(0.7,32,32);
const mat=new THREE.MeshStandardMaterial({color});

const player=new THREE.Mesh(geo,mat);

player.position.y=1;

scene.add(player);

return player;

}

const player1=createPlayer(0x00ff00);
const player2=createPlayer(0xff4444);

let positions=[0,0];
updateTileHighlights()

let money=[5000,5000];
let salary=[1000,1000];
let expenses=[800,800];
let passive=[0,0];

function createDiceMaterial(number){

const canvas=document.createElement("canvas");
canvas.width=256;
canvas.height=256;

const ctx=canvas.getContext("2d");

ctx.fillStyle="white";
ctx.fillRect(0,0,256,256);

ctx.fillStyle="black";
ctx.font="bold 160px Arial";
ctx.textAlign="center";
ctx.textBaseline="middle";

ctx.fillText(number,128,140);

const texture=new THREE.CanvasTexture(canvas);

return new THREE.MeshStandardMaterial({map:texture});

}

const dice=new THREE.Mesh(
new THREE.BoxGeometry(1,1,1),
[
createDiceMaterial(1),
createDiceMaterial(2),
createDiceMaterial(3),
createDiceMaterial(4),
createDiceMaterial(5),
createDiceMaterial(6)
]
);

dice.position.set(0,3,0);
scene.add(dice);

let currentPlayer=0;

function rollDice(){

const result=Math.floor(Math.random()*6)+1;
animateDice(result);

}

function animateDice(result){

let frames=0;

function spin(){

dice.rotation.x+=0.25;
dice.rotation.y+=0.25;

frames++;

if(frames<25){

requestAnimationFrame(spin);

}else{

movePlayer(result);

}

}

spin();

}

function movePlayer(steps){

let stepCount=0;

function stepMove(){

if(stepCount>=steps){

resolveTile(positions[currentPlayer]);
return;

}

stepCount++;

positions[currentPlayer]=(positions[currentPlayer]+1)%tiles.length;

const player=currentPlayer===0?player1:player2;

const tile=tiles[positions[currentPlayer]];

const startX=player.position.x;
const startZ=player.position.z;

const endX=tile.position.x;
const endZ=tile.position.z;

let p=0;

function anim(){

p+=0.08;

player.position.x=startX+(endX-startX)*p;
player.position.z=startZ+(endZ-startZ)*p;

if(p<1){

requestAnimationFrame(anim);

}else{

updateTileHighlights();
setTimeout(stepMove,120);

}

}

anim();

}

stepMove();

}

function resolveTile(index){

const type=tileTypes[index];

if(type==="payday") money[currentPlayer]+=salary[currentPlayer];

if(type==="smallDeal" && money[currentPlayer]>=1000){

money[currentPlayer]-=1000;
passive[currentPlayer]+=100;

}

if(type==="bigDeal" && money[currentPlayer]>=4000){

money[currentPlayer]-=4000;
passive[currentPlayer]+=500;

}

if(type==="market"){

money[currentPlayer]+=Math.floor(Math.random()*1000)-500;

}

if(type==="doodad") money[currentPlayer]-=700;

if(type==="charity"){

money[currentPlayer]-=300;
expenses[currentPlayer]-=50;

}

resolveTurn();

}

function resolveTurn(){

money[currentPlayer]+=passive[currentPlayer];
money[currentPlayer]-=expenses[currentPlayer];

updateUI();
switchTurn();

}

function aiTurn(){

setTimeout(()=>rollDice(),1000);

}

function switchTurn(){

currentPlayer=currentPlayer===0?1:0;

turn.innerText=currentPlayer===0?"Jugador 1":"Jugador 2";

if(currentPlayer===1) aiTurn();

}

function updateUI(){

money1.innerText=money[0];
money2.innerText=money[1];

passive1.innerText=passive[0];
passive2.innerText=passive[1];

expenses1.innerText=expenses[0];
expenses2.innerText=expenses[1];

}

function updateTileHighlights(){

for(let i=0;i<tiles.length;i++){

tiles[i].material.emissive.set(0x000000);

}

tiles[positions[0]].material.emissive.set(0x00ff00);
tiles[positions[1]].material.emissive.set(0xff0000);

}

function animate(){

requestAnimationFrame(animate);
renderer.render(scene,camera);

}

animate();

</script>

</body>
</html>
