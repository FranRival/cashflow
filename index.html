<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Trapecios Cashflow</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
}

#ui{
position:absolute;
top:20px;
left:20px;
background:rgba(0,0,0,0.6);
padding:12px;
border-radius:8px;
color:white;
}

button{
padding:10px;
font-size:16px;
}

</style>
</head>

<body>

<div id="ui">

<button onclick="rollDice()">Lanzar dado</button>

<hr>

<b>Jugador 1</b><br>

Dinero: $<span id="money1"></span>

<br><br>

INGRESOS<br>
Salario: $<span id="salary1"></span><br>
Bienes raíces: $<span id="realestate1"></span><br>
Intereses: $<span id="interest1"></span><br>
Dividendos: $<span id="dividends1"></span><br>
Negocios: $<span id="business1"></span><br>
Otros activos: $<span id="otherassets1"></span><br>

Total ingresos: $<span id="incomeTotal1"></span>

<br><br>

GASTOS<br>
Impuestos: $<span id="tax1"></span><br>
Hipoteca: $<span id="mortgage1"></span><br>
Préstamo escolar: $<span id="school1"></span><br>
Auto: $<span id="car1"></span><br>
Tarjeta crédito: $<span id="credit1"></span><br>
Pagos menores: $<span id="retail1"></span><br>
Otros: $<span id="other1"></span><br>
Hijos: $<span id="children1"></span><br>

Total gastos: $<span id="expenseTotal1"></span>

<br><br>

Flujo de caja: $<span id="cashflow1"></span>

</div>

<div id="card" style="
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
color:black;
padding:20px;
border-radius:10px;
width:320px;
display:none;
box-shadow:0 0 20px rgba(0,0,0,0.5);
">

<h3 id="cardTitle"></h3>
<div id="cardBody"></div>

<br>

<button onclick="closeCard()">OK</button>

</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>


//turno de quien es. trajeta en la esquina superior izqueirda
//tarjetas, aceptar trato o declinar (compra de activos)
//flujo le hace falta dinero ahorrado.
/* ESCENA */

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

/* CAMARA */

const camera = new THREE.PerspectiveCamera(
60,
window.innerWidth/window.innerHeight,
0.1,
1000
);

let cameraAngle = 0;
let cameraRadius = 15;
let cameraHeight = 8;

camera.position.set(0,cameraHeight,cameraRadius);
camera.lookAt(0,0,0);

window.addEventListener("mousemove",(e)=>{

cameraAngle = (e.clientX / window.innerWidth) * Math.PI * 2;

camera.position.x = Math.cos(cameraAngle) * cameraRadius;
camera.position.z = Math.sin(cameraAngle) * cameraRadius;
camera.position.y = cameraHeight;

camera.lookAt(0,0,0);

});

/* RENDER */

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

/* LUCES */

scene.add(new THREE.AmbientLight(0xffffff,0.9));

const light = new THREE.DirectionalLight(0xffffff,0.6);
light.position.set(10,20,10);
scene.add(light);

/* COLORES */

function tileColor(type){

switch(type){

case "payday": return 0x2ecc71;
case "smallDeal": return 0x3498db;
case "bigDeal": return 0x9b59b6;
case "market": return 0xf1c40f;
case "charity": return 0xffffff;
case "doodad": return 0xe74c3c;

default: return 0x888888;

}

}

/* CASILLA RANDOM */

function randomTileType(){

const r=Math.random();

if(r<0.2) return "payday";
if(r<0.55) return "smallDeal";
if(r<0.65) return "bigDeal";
if(r<0.75) return "market";
if(r<0.90) return "doodad";

return "charity";

}

/* TRAPECIO */

function createTrapezoid(type){

const group = new THREE.Group();

const widthFront = 2;
const widthBack = 1.2;
const length = 3;
const height = 0.5;

const shape = new THREE.Shape();

shape.moveTo(-widthFront/2,-length/2);
shape.lineTo(widthFront/2,-length/2);
shape.lineTo(widthBack/2,length/2);
shape.lineTo(-widthBack/2,length/2);

const geometry = new THREE.ExtrudeGeometry(shape,{
depth:height,
bevelEnabled:false
});

geometry.rotateX(-Math.PI/2);

const material = new THREE.MeshLambertMaterial({
color:tileColor(type)
});

const body = new THREE.Mesh(geometry,material);

group.add(body);
group.body = body;

/* TEXTO */

const canvas = document.createElement("canvas");
canvas.width = 256;
canvas.height = 128;

const ctx = canvas.getContext("2d");

ctx.fillStyle = "#" + tileColor(type).toString(16).padStart(6,"0");
ctx.fillRect(0,0,256,128);

ctx.fillStyle="black";
ctx.font="bold 36px Arial";
ctx.textAlign="center";
ctx.textBaseline="middle";

ctx.fillText(type.toUpperCase(),128,64);

const texture = new THREE.CanvasTexture(canvas);

const labelMaterial = new THREE.MeshBasicMaterial({map:texture});
const labelGeometry = new THREE.PlaneGeometry(2,1);

const label = new THREE.Mesh(labelGeometry,labelMaterial);

label.position.set(0,0.6,length/2 + 0.02);

group.add(label);

return group;

}

/* TABLERO */

const tileCount = 24;
const radius = 6.2;

const tiles=[];
const tileTypes=[];

for(let i=0;i<tileCount;i++){

const angle = i/tileCount*Math.PI*2;

const type = randomTileType();

const tile = createTrapezoid(type);

tile.position.x = Math.cos(angle)*radius;
tile.position.z = Math.sin(angle)*radius;

tile.rotation.y = -angle + Math.PI/2;

scene.add(tile);

tiles.push(tile);
tileTypes.push(type);

}

/* ILUMINACION */

function updateTileHighlights(){

for(let i=0;i<tiles.length;i++){

tiles[i].body.material.emissive.set(0x000000);

}

tiles[positions[0]].body.material.emissive.set(0x00ff00);
tiles[positions[1]].body.material.emissive.set(0xff0000);

}

/* DADO */

function createDiceMaterial(number){

const canvas=document.createElement("canvas");
canvas.width=256;
canvas.height=256;

const ctx=canvas.getContext("2d");

ctx.fillStyle="white";
ctx.fillRect(0,0,256,256);

ctx.fillStyle="black";
ctx.font="bold 160px Arial";
ctx.textAlign="center";
ctx.textBaseline="middle";

ctx.fillText(number,128,140);

const texture=new THREE.CanvasTexture(canvas);

return new THREE.MeshStandardMaterial({map:texture});

}

const dice = new THREE.Mesh(
new THREE.BoxGeometry(1.2,1.2,1.2),
[
createDiceMaterial(1),
createDiceMaterial(2),
createDiceMaterial(3),
createDiceMaterial(4),
createDiceMaterial(5),
createDiceMaterial(6)
]
);

dice.position.set(0,1.2,0);
scene.add(dice);

/* JUGADORES */

function createPlayer(color){

const geo=new THREE.SphereGeometry(0.5,32,32);
const mat=new THREE.MeshStandardMaterial({color});

const player=new THREE.Mesh(geo,mat);
player.position.y=1;

scene.add(player);

return player;

}

const player1=createPlayer(0x00ff00);
const player2=createPlayer(0xff4444);

let positions=[0,0];
let waitingCard = false;

/* ECONOMIA */

let money=[5000,5000];

const smallDeals = [

{title:"Casa pequeña",cost:6000,cashflow:200},
{title:"Departamento",cost:8000,cashflow:300},
{title:"Terreno",cost:3000,cashflow:100}

];

const bigDeals = [

{title:"Edificio 12 unidades",cost:40000,cashflow:2500},
{title:"Centro comercial",cost:60000,cashflow:4000}

];

const marketCards = [

{title:"Boom inmobiliario",effect:"realEstateDouble"},
{title:"Crash de mercado",effect:"realEstateHalf"}

];

let income=[
{salary:1000,realEstate:0,interest:0,dividends:0,business:0,otherAssets:0},
{salary:1000,realEstate:0,interest:0,dividends:0,business:0,otherAssets:0}
];

let expenses=[
{tax:200,mortgage:200,schoolLoan:100,carLoan:100,creditCard:100,retail:50,other:50,children:0},
{tax:200,mortgage:200,schoolLoan:100,carLoan:100,creditCard:100,retail:50,other:50,children:0}
];


function getCashflow(player){

const inc = income[player];
const exp = expenses[player];

const incomeTotal =
inc.salary +
inc.realEstate +
inc.interest +
inc.dividends +
inc.business +
inc.otherAssets;

const expenseTotal =
exp.tax +
exp.mortgage +
exp.schoolLoan +
exp.carLoan +
exp.creditCard +
exp.retail +
exp.other +
exp.children;

return incomeTotal - expenseTotal;

}
/* UI */

function updateUI(){

const inc=income[0];
const exp=expenses[0];

const incomeTotal =
inc.salary+
inc.realEstate+
inc.interest+
inc.dividends+
inc.business+
inc.otherAssets;

const expenseTotal =
exp.tax+
exp.mortgage+
exp.schoolLoan+
exp.carLoan+
exp.creditCard+
exp.retail+
exp.other+
exp.children;

money1.innerText=money[0];

salary1.innerText=inc.salary;
realestate1.innerText=inc.realEstate;
interest1.innerText=inc.interest;
dividends1.innerText=inc.dividends;
business1.innerText=inc.business;
otherassets1.innerText=inc.otherAssets;

incomeTotal1.innerText=incomeTotal;

tax1.innerText=exp.tax;
mortgage1.innerText=exp.mortgage;
school1.innerText=exp.schoolLoan;
car1.innerText=exp.carLoan;
credit1.innerText=exp.creditCard;
retail1.innerText=exp.retail;
other1.innerText=exp.other;
children1.innerText=exp.children;

expenseTotal1.innerText=expenseTotal;

cashflow1.innerText=incomeTotal-expenseTotal;

}

function animateValueChange(elementId, change){

const el = document.getElementById(elementId);

if(!el) return;

if(change > 0){

el.style.color = "#00ff00";

}else if(change < 0){

el.style.color = "#ff4444";

}

setTimeout(()=>{

el.style.color = "white";

},1000);

}

/* CARTAS */

function showCard(title,body){

    waitingCard = true;

cardTitle.innerText=title;
cardBody.innerHTML=body;

card.style.display="block";

}

function closeCard(){

card.style.display="none";

waitingCard = false;
switchTurn();
}

/* EVENTO CASILLA */


function resolveTile(index){

const type = tileTypes[index];

/* PAYDAY */


if(type === "payday"){

const salary = income[currentPlayer].salary;

money[currentPlayer] += salary;

const moneyElement = currentPlayer === 0 ? "money1" : "money2";

animateValueChange(moneyElement, salary);

showCard(
"PAYDAY",
`Recibes tu salario de $${salary}`
);

}

/* SMALL DEAL */

if(type === "smallDeal"){

const deal =
smallDeals[Math.floor(Math.random()*smallDeals.length)];

showCard(
"SMALL DEAL",
`
Activo: ${deal.title}<br>
Costo: $${deal.cost}<br>
Flujo de caja: $${deal.cashflow}
`
);

if(money[currentPlayer] >= deal.cost){

money[currentPlayer] -= deal.cost;
income[currentPlayer].realEstate += deal.cashflow;
animateValueChange("cashflow1", deal.cashflow);

}

}

/* BIG DEAL */

if(type === "bigDeal"){

const deal =
bigDeals[Math.floor(Math.random()*bigDeals.length)];

showCard(
"BIG DEAL",
`
Activo: ${deal.title}<br>
Costo: $${deal.cost}<br>
Flujo de caja: $${deal.cashflow}
`
);

if(money[currentPlayer] >= deal.cost){

money[currentPlayer] -= deal.cost;
income[currentPlayer].business += deal.cashflow;
animateValueChange("cashflow1", deal.cashflow);

}

}

/* MARKET */

if(type === "market"){

const event =
marketCards[Math.floor(Math.random()*marketCards.length)];

showCard(
"MARKET",
event.title
);

if(event.effect === "realEstateDouble"){

income[currentPlayer].realEstate += 250;

}

if(event.effect === "realEstateHalf"){

income[currentPlayer].realEstate =
Math.floor(income[currentPlayer].realEstate * 0.7);

}

updateUI();

}

/* DOODAD */

if(type === "doodad"){

const cost = 700;

money[currentPlayer] =
Math.max(0, money[currentPlayer] - cost);
animateValueChange("money1", -cost);

showCard(
"DOODAD",
`Gasto inesperado de $${cost}`
);

}

/* CHARITY */

if(type === "charity"){

const cost = 300;

money[currentPlayer] =
Math.max(0, money[currentPlayer] - cost);

showCard(
"CHARITY",
`Donación de $${cost}<br>
Tus gastos se reducen`
);

expenses[currentPlayer].other =
Math.max(0, expenses[currentPlayer].other - 50);

}

}

/* TURNOS */

let currentPlayer=0;

function rollDice(){

if(currentPlayer!==0 || waitingCard) return;

const result=Math.floor(Math.random()*6)+1;

movePlayer(result);

}

function aiTurn(){

setTimeout(()=>{

const result=Math.floor(Math.random()*6)+1;

movePlayer(result);

},800);

}

function switchTurn(){

currentPlayer=currentPlayer===0?1:0;

if(currentPlayer===1) {setTimeout(aiTurn, 1500)}

}

/* MOVIMIENTO */

function movePlayer(steps){

let step=0;

function stepMove(){

if(step>=steps){

resolveTile(positions[currentPlayer]);

updateUI();


return


}

step++;

positions[currentPlayer]=(positions[currentPlayer]+1)%tiles.length;

const player=currentPlayer===0?player1:player2;

const tile=tiles[positions[currentPlayer]];

const startX=player.position.x;
const startZ=player.position.z;

const endX=tile.position.x;
const endZ=tile.position.z;

let progress=0;

function animateMove(){

progress+=0.05;

player.position.x=startX+(endX-startX)*progress;
player.position.z=startZ+(endZ-startZ)*progress;

if(progress<1){

requestAnimationFrame(animateMove);

}else{

updateTileHighlights();
setTimeout(stepMove,120);

}

}

animateMove();

}

stepMove();

}

/* POSICION INICIAL */

function placePlayers(){

const tile=tiles[0];

player1.position.x=tile.position.x;
player1.position.z=tile.position.z;

player2.position.x=tile.position.x+0.6;
player2.position.z=tile.position.z;

}

placePlayers();
updateTileHighlights();
updateUI();

/* LOOP */

function animate(){

requestAnimationFrame(animate);

dice.rotation.x+=0.01;
dice.rotation.y+=0.01;

renderer.render(scene,camera);

}

animate();

</script>

</body>
</html>
