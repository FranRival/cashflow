<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Trapecios Cashflow</title>

<style>
body{
margin:0;
overflow:hidden;
background:white;
}


</style>

</head>
<body>
<div style="
position:absolute;
top:20px;
left:20px;
background:rgba(0,0,0,0.6);
padding:10px;
border-radius:8px;
color:white;
">

<button onclick="rollDice()">Lanzar dado</button>

</div>

<button onclick="rollDice()">Lanzar dado</button>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

/* ======================
ESCENA
====================== */

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

/* ======================
CAMARA
====================== */

const camera = new THREE.PerspectiveCamera(
60,
window.innerWidth/window.innerHeight,
0.1,
1000
);

camera.position.set(0,12,16);
camera.lookAt(0,0,0);

let cameraAngle = 0;
let cameraRadius = 15;
let cameraHeight = 8;

let currentPlayer = 0;

window.addEventListener("mousemove",(e)=>{

cameraAngle = (e.clientX / window.innerWidth) * Math.PI * 2;

camera.position.x = Math.cos(cameraAngle) * cameraRadius;
camera.position.z = Math.sin(cameraAngle) * cameraRadius;
camera.position.y = cameraHeight;

camera.lookAt(0,0,0);

});

/* ======================
RENDER
====================== */

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

/* ======================
LUCES
====================== */

scene.add(new THREE.AmbientLight(0xffffff,0.9));

const light = new THREE.DirectionalLight(0xffffff,0.6);
light.position.set(10,20,10);
scene.add(light);

/* ======================
COLORES
====================== */

function tileColor(type){

switch(type){

case "payday": return 0x2ecc71;
case "smallDeal": return 0x3498db;
case "bigDeal": return 0x9b59b6;
case "market": return 0xf1c40f;
case "charity": return 0xffffff;
case "doodad": return 0xe74c3c;

default: return 0x888888;

}

}

/* ======================
TIPO RANDOM
====================== */

function randomTileType(){

const r=Math.random();

if(r<0.2) return "payday";
if(r<0.45) return "smallDeal";
if(r<0.6) return "bigDeal";
if(r<0.75) return "market";
if(r<0.9) return "doodad";

return "charity";

}

/* ======================
TRAPECIO
====================== */

function createTrapezoid(type){

const group = new THREE.Group();

const widthFront = 2;
const widthBack = 1.2;
const length = 3;
const height = 0.5;

/* cuerpo del trapecio */

const shape = new THREE.Shape();

shape.moveTo(-widthFront/2,-length/2);
shape.lineTo(widthFront/2,-length/2);
shape.lineTo(widthBack/2,length/2);
shape.lineTo(-widthBack/2,length/2);

const geometry = new THREE.ExtrudeGeometry(shape,{
depth:height,
bevelEnabled:false
});

geometry.rotateX(-Math.PI/2);

const material = new THREE.MeshLambertMaterial({
color:tileColor(type)
});

const body = new THREE.Mesh(geometry,material);

group.add(body);

/* ======================
TEXTO EXTERIOR
====================== */

const canvas = document.createElement("canvas");
canvas.width = 256;
canvas.height = 128;

const ctx = canvas.getContext("2d");

ctx.fillStyle = "#" + tileColor(type).toString(16).padStart(6,"0")
ctx.fillRect(0,0,256,128);

ctx.fillStyle=(type==="charity")?"black":"black";
ctx.font="bold 36px Arial";
ctx.textAlign="center";
ctx.textBaseline="middle";

ctx.fillText(type.toUpperCase(),128,64);

const texture = new THREE.CanvasTexture(canvas);

const labelMaterial = new THREE.MeshBasicMaterial({
map:texture,
transparent:false
});

const labelGeometry = new THREE.PlaneGeometry(2,1);

const label = new THREE.Mesh(labelGeometry,labelMaterial);

/* posición en la cara frontal */

label.position.set(0,0.6,length/2 + 0.02);

group.add(label);

return group;

}

/* ======================
CIRCULO
====================== */

const tileCount = 24;
const radius = 6.2;

const tiles = [];

for(let i=0;i<tileCount;i++){

const angle = i/tileCount*Math.PI*2;

const type = randomTileType();

const tile = createTrapezoid(type);

tile.position.x = Math.cos(angle)*radius;
tile.position.z = Math.sin(angle)*radius;

tile.rotation.y = -angle + Math.PI/2;

scene.add(tile);
tiles.push(tile);

}

//dado 
function createDiceMaterial(number){

const canvas = document.createElement("canvas");
canvas.width = 256;
canvas.height = 256;

const ctx = canvas.getContext("2d");

ctx.fillStyle = "white";
ctx.fillRect(0,0,256,256);

ctx.fillStyle = "black";
ctx.font = "bold 160px Arial";
ctx.textAlign = "center";
ctx.textBaseline = "middle";

ctx.fillText(number,128,140);

const texture = new THREE.CanvasTexture(canvas);

return new THREE.MeshStandardMaterial({map:texture});

}



//girar dado
function rollDice(){

if(currentPlayer !== 0) return;

const result = Math.floor(Math.random()*6)+1;

console.log("Jugador sacó:",result);

movePlayer(result);

}


// IA
function aiTurn(){

setTimeout(()=>{

const result = Math.floor(Math.random()*6)+1;

console.log("IA sacó:", result);

movePlayer(result);

},800);

}


// cambio de turno
function switchTurn(){

currentPlayer = currentPlayer === 0 ? 1 : 0;

console.log("Turno jugador", currentPlayer + 1);

if(currentPlayer === 1){

aiTurn();

}

}

function switchTurn(){

currentPlayer = currentPlayer === 0 ? 1 : 0;

}

//mover jugador 
function movePlayer(steps){

let step = 0;

function nextStep(){

if(step >= steps){

switchTurn();
return;

}

step++;

positions[currentPlayer] =
(positions[currentPlayer] + 1) % tiles.length;

const player =
currentPlayer === 0 ? player1 : player2;

const tile = tiles[positions[currentPlayer]];

player.position.x = tile.position.x;
player.position.z = tile.position.z;

setTimeout(nextStep,200);

}

nextStep();

}

const dice = new THREE.Mesh(

new THREE.BoxGeometry(1.2,1.2,1.2),

[
createDiceMaterial(1),
createDiceMaterial(2),
createDiceMaterial(3),
createDiceMaterial(4),
createDiceMaterial(5),
createDiceMaterial(6)

]

);

dice.position.set(0,1.2,0);

scene.add(dice);


//jugadores 

function createPlayer(color){

const geometry = new THREE.SphereGeometry(0.5,32,32);

const material = new THREE.MeshStandardMaterial({
color:color
});

const player = new THREE.Mesh(geometry,material);

player.position.y = 1;

scene.add(player);

return player;

}

const player1 = createPlayer(0x00ff00);
const player2 = createPlayer(0xff4444);

let positions = [0,0];

function placePlayers(){

const tile = tiles[0];

player1.position.x = tile.position.x;
player1.position.z = tile.position.z;

player2.position.x = tile.position.x + 0.6;
player2.position.z = tile.position.z;

}

placePlayers();
/* ======================
LOOP
====================== */

function animate(){

requestAnimationFrame(animate);

dice.rotation.x += 0.01;
dice.rotation.y += 0.01;

renderer.render(scene,camera);

}

animate();

</script>

</body>
</html>
