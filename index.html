<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cashflow MVP 3D</title>

<style>
body{
margin:0;
overflow:hidden;
background:#111;
font-family:Arial;
}

#ui{
position:absolute;
top:20px;
left:20px;
background:rgba(0,0,0,0.6);
padding:12px;
border-radius:8px;
color:white;
}

button{
padding:10px;
margin-top:8px;
font-size:16px;
}
</style>

</head>
<body>

<div id="ui">
<div>Turno: <span id="turn">Jugador 1</span></div>

<div>Dinero J1: $<span id="money1">5000</span></div>
<div>Pasivo J1: $<span id="passive1">0</span></div>
<div>Gastos J1: $<span id="expenses1">800</span></div>

<br>

<div>Dinero J2: $<span id="money2">5000</span></div>
<div>Pasivo J2: $<span id="passive2">0</span></div>
<div>Gastos J2: $<span id="expenses2">800</span></div>

<button onclick="rollDice()">Lanzar dado</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

// ========================
// ESCENA
// ========================

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x202020);

// ========================
// CAMARA
// ========================

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);

let cameraAngle=0;
let cameraRadius=25;
let cameraHeight=18;

camera.position.set(0,cameraHeight,cameraRadius);
camera.lookAt(0,0,0);

// rotación cámara

let isDragging=false;
let lastX=0;

window.addEventListener("mousedown",(e)=>{
isDragging=true;
lastX=e.clientX;
});

window.addEventListener("mouseup",()=>{
isDragging=false;
});

window.addEventListener("mousemove",(e)=>{

cameraAngle=(e.clientX/window.innerWidth) * Math.PI*2;

camera.position.x=Math.cos(cameraAngle)*cameraRadius;
camera.position.z=Math.sin(cameraAngle)*cameraRadius;
camera.position.y=cameraHeight;

camera.lookAt(0,0,0);

});

// ========================
// RENDERER
// ========================

const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

// ========================
// LUCES
// ========================

const light=new THREE.DirectionalLight(0xffffff,1);
light.position.set(10,20,10);
scene.add(light);

scene.add(new THREE.AmbientLight(0xffffff,0.5));

// ========================
// TIPOS DE CASILLA
// ========================

function tileColor(type){

switch(type){

case "payday": return 0x2ecc71;
case "smallDeal": return 0x3498db;
case "bigDeal": return 0x9b59b6;
case "market": return 0xf1c40f;
case "charity": return 0xffffff;
case "doodad": return 0xe74c3c;

default: return 0x555555;

}

}

function randomTileType(){

const r=Math.random();

if(r<0.2) return "payday";
if(r<0.45) return "smallDeal";
if(r<0.6) return "bigDeal";
if(r<0.75) return "market";
if(r<0.9) return "doodad";

return "charity";

}

// ========================
// TABLERO
// ========================
// ========================
// PISTA 8 SUAVE CON DISTANCIA UNIFORME
// ========================

const tiles = [];
const tileTypes = [];

const tileSize = 2;
const tileSpacing = 2.6;      // distancia mínima entre cuadros
const targetTiles = 80;       // número aproximado de cuadros
const scale = 14;             // tamaño general de la pista

// ---- curva base (8 suave tipo lemniscata de Gerono con deformación) ----
function curve(t){
  // t en [0, 2π]
  const x = Math.cos(t) * (1.0 + 0.15*Math.sin(3*t));  // pequeña irregularidad
  const z = Math.sin(t) * Math.cos(t) * (1.2 + 0.1*Math.cos(2*t));
  return { x: x * scale, z: z * scale };
}

// ---- tangente aproximada para orientar el tile ----
function tangent(t){
  const dt = 0.0001;
  const p1 = curve(t);
  const p2 = curve(t + dt);
  return {
    x: p2.x - p1.x,
    z: p2.z - p1.z
  };
}

// ---- muestreo por distancia ----
let t = 0;
let last = curve(0);

createTile(last, 0);

while(tiles.length < targetTiles){

  t += 0.01;

  const p = curve(t);

  const dx = p.x - last.x;
  const dz = p.z - last.z;

  const dist = Math.sqrt(dx*dx + dz*dz);

  if(dist >= tileSpacing){

    const tan = tangent(t);
    const angle = Math.atan2(tan.z, tan.x);

    createTile(p, angle);

    last = p;

  }

  if(t > Math.PI * 2) break;

}

// ---- función de creación ----
function createTile(pos, angle){

  const type = randomTileType();

  const geo = new THREE.BoxGeometry(tileSize,0.5,tileSize);

  const mat = new THREE.MeshStandardMaterial({
    color: tileColor(type)
  });

  const tile = new THREE.Mesh(geo, mat);

  tile.position.set(pos.x, 0, pos.z);

  tile.rotation.y = -angle;

  scene.add(tile);

  tiles.push(tile);
  tileTypes.push(type);

}
// ========================
// JUGADORES
// ========================

function createPlayer(color){

const geo=new THREE.SphereGeometry(0.7,32,32);
const mat=new THREE.MeshStandardMaterial({color});

const player=new THREE.Mesh(geo,mat);

player.position.y=1;

scene.add(player);

return player;

}

const player1=createPlayer(0x00ff00);
const player2=createPlayer(0xff4444);

let positions=[0,0];

// ========================
// ECONOMIA - 
// ========================

let money=[5000,5000];
let salary=[1000,1000];
let expenses=[800,800];
let passive=[0,0];

// ========================
// DADO
// ========================

// ========================
// DADO CON NUMEROS
// ========================

function createDiceMaterial(number){

const canvas=document.createElement("canvas");
canvas.width=256;
canvas.height=256;

const ctx=canvas.getContext("2d");

ctx.fillStyle="white";
ctx.fillRect(0,0,256,256);

ctx.fillStyle="black";
ctx.font="bold 160px Arial";
ctx.textAlign="center";
ctx.textBaseline="middle";

ctx.fillText(number,128,140);

const texture=new THREE.CanvasTexture(canvas);

return new THREE.MeshStandardMaterial({map:texture});

}

const diceMaterials=[

createDiceMaterial(1),
createDiceMaterial(2),
createDiceMaterial(3),
createDiceMaterial(4),
createDiceMaterial(5),
createDiceMaterial(6)

];

const diceGeo=new THREE.BoxGeometry(1,1,1);
const dice=new THREE.Mesh(diceGeo,diceMaterials);

dice.position.set(0,3,0);

scene.add(dice);

dice.position.set(0,3,0);
scene.add(dice);

// ========================
// TURNOS
// ========================

let currentPlayer=0;

// ========================
// LANZAR DADO
// ========================


function rollDice(){

const result = Math.floor(Math.random()*6)+1;

animateDice(result);

}


function animateDice(result){

let frames=0;

function spin(){

dice.rotation.x+=0.25;
dice.rotation.y+=0.25;

frames++;

if(frames<25){

requestAnimationFrame(spin);

}else{

setDiceFace(result);

movePlayer(result);

}

}

spin();

}

function setDiceFace(n){

switch(n){

case 1:
dice.rotation.set(0,0,0);
break;

case 2:
dice.rotation.set(0,Math.PI/2,0);
break;

case 3:
dice.rotation.set(Math.PI/2,0,0);
break;

case 4:
dice.rotation.set(-Math.PI/2,0,0);
break;

case 5:
dice.rotation.set(0,-Math.PI/2,0);
break;

case 6:
dice.rotation.set(Math.PI,0,0);
break;

}

}
// ========================
// MOVIMIENTO
// ========================

function movePlayer(steps){

let stepCount = 0;

function stepMove(){

if(stepCount >= steps){

resolveTile(positions[currentPlayer]);
return;

}

stepCount++;

positions[currentPlayer] = (positions[currentPlayer] + 1) % tiles.length;

const player = currentPlayer === 0 ? player1 : player2;

const tile = tiles[positions[currentPlayer]];

const startX = player.position.x;
const startZ = player.position.z;

const endX = tile.position.x;
const endZ = tile.position.z;

let p = 0;

function anim(){

p += 0.08;

player.position.x = startX + (endX-startX)*p;
player.position.z = startZ + (endZ-startZ)*p;

if(p < 1){

requestAnimationFrame(anim);

}else{

updateTileHighlights();

setTimeout(stepMove,120);

}

}

anim();

}

stepMove();

}

// ========================
// EVENTOS
// ========================

function resolveTile(index){

const type=tileTypes[index];

if(type==="payday"){

money[currentPlayer]+=salary[currentPlayer];

}

if(type==="smallDeal"){

if(money[currentPlayer]>=1000){

money[currentPlayer]-=1000;
passive[currentPlayer]+=100;

}

}

if(type==="bigDeal"){

if(money[currentPlayer]>=4000){

money[currentPlayer]-=4000;
passive[currentPlayer]+=500;

}

}

if(type==="market"){

let change=Math.floor(Math.random()*1000)-500;
money[currentPlayer]+=change;

}

if(type==="doodad"){

money[currentPlayer]-=700;

}

if(type==="charity"){

money[currentPlayer]-=300;
expenses[currentPlayer]-=50;

}

resolveTurn();

}

// ========================
// FIN TURNO
// ========================

function resolveTurn(){

money[currentPlayer]+=passive[currentPlayer];
money[currentPlayer]-=expenses[currentPlayer];

updateUI();
switchTurn();

}

// ========================
// IA
// ========================

function aiTurn(){

setTimeout(()=>{
rollDice();
},1000);

}

// ========================
// CAMBIO TURNO
// ========================

function switchTurn(){

currentPlayer=currentPlayer===0?1:0;

document.getElementById("turn").innerText=
currentPlayer===0?"Jugador 1":"Jugador 2";

if(currentPlayer===1) aiTurn();

}

// ========================
// UI
// ========================

function updateUI(){

document.getElementById("money1").innerText=money[0];
document.getElementById("money2").innerText=money[1];

document.getElementById("passive1").innerText=passive[0];
document.getElementById("passive2").innerText=passive[1];

document.getElementById("expenses1").innerText=expenses[0];
document.getElementById("expenses2").innerText=expenses[1];

}

function updateTileHighlights(){

// primero quitar brillo de todos los tiles

for(let i=0;i<tiles.length;i++){

tiles[i].material.emissive.set(0x000000);

}

// brillo jugador 1

const tile1 = tiles[positions[0]];

tile1.material.emissive.set(0x00ff00);
tile1.material.emissiveIntensity = 0.6;

// brillo jugador 2

const tile2 = tiles[positions[1]];

tile2.material.emissive.set(0xff0000);
tile2.material.emissiveIntensity = 0.6;

}

// ========================
// LOOP
// ========================

function animate(){

requestAnimationFrame(animate);
renderer.render(scene,camera);

}

animate();

</script>

</body>
</html>
