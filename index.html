<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cashflow MVP 3D</title>

<style>
body{
margin:0;
overflow:hidden;
background:#111;
font-family:Arial;
}

#ui{
position:absolute;
top:20px;
left:20px;
background:rgba(0,0,0,0.6);
padding:12px;
border-radius:8px;
color:white;
}

button{
padding:10px;
margin-top:8px;
font-size:16px;
}
</style>

</head>
<body>

<div id="ui">
<div>Turno: <span id="turn">Jugador 1</span></div>
<div>Dinero J1: $<span id="money1">5000</span></div>
<div>Dinero J2: $<span id="money2">5000</span></div>
<button onclick="rollDice()">Lanzar dado</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

// ----------------
// ESCENA
// ----------------

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x202020);

// ----------------
// CÁMARA
// ----------------

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);

let cameraAngle = 0;
let cameraRadius = 25;
let cameraHeight = 18;

// posición inicial segura
camera.position.set(0,cameraHeight,cameraRadius);
camera.lookAt(0,0,0);

// ----------------
// RENDERER
// ----------------

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

// ----------------
// LUCES
// ----------------

const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(10,20,10);
scene.add(light);

scene.add(new THREE.AmbientLight(0xffffff,0.5));

// ----------------
// ROTACIÓN DE CÁMARA
// (controlada por mouse)
// ----------------

window.addEventListener("mousemove",(e)=>{

cameraAngle = (e.clientX / window.innerWidth) * Math.PI * 2;

camera.position.x = Math.cos(cameraAngle) * cameraRadius;
camera.position.z = Math.sin(cameraAngle) * cameraRadius;
camera.position.y = cameraHeight;

camera.lookAt(0,0,0);

});

// ----------------
// TABLERO SERPENTEADO
// ----------------

const tiles=[];
const tileTypes=[];

const tileSize=2;
const width=6;
const height=6;

let direction=1;

for(let z=0;z<height;z++){

for(let x=0;x<width;x++){

let realX = direction===1 ? x : (width-1-x);

const geo = new THREE.BoxGeometry(tileSize,0.5,tileSize);
const mat = new THREE.MeshStandardMaterial({color:0x555555});

const tile = new THREE.Mesh(geo,mat);

tile.position.x = (realX-width/2) *(tileSize+0.3);
tile.position.z = (z-height/2) * (tileSize+0.3);

scene.add(tile);

tiles.push(tile);

// tipo de casilla
let r=Math.random();

if(r<0.33) tileTypes.push("expense");
else if(r<0.66) tileTypes.push("income");
else tileTypes.push("investment");

}

direction*=-1;

}

// ----------------
// JUGADORES
// ----------------

function createPlayer(color){

const geo=new THREE.SphereGeometry(0.7,32,32);
const mat=new THREE.MeshStandardMaterial({color});

const player=new THREE.Mesh(geo,mat);

player.position.y=1;

scene.add(player);

return player;

}

const player1=createPlayer(0x00ff00);
const player2=createPlayer(0xff4444);

let positions=[0,0];

// ----------------
// SISTEMA FINANCIERO
// ----------------

let money=[5000,5000];
let salary=[1000,1000];
let expenses=[800,800];
let passive=[0,0];

// ----------------
// DADO
// ----------------

const diceGeo=new THREE.BoxGeometry(1,1,1);
const diceMat=new THREE.MeshStandardMaterial({color:0xffffff});
const dice=new THREE.Mesh(diceGeo,diceMat);

dice.position.set(0,3,0);

scene.add(dice);

// ----------------
// TURNOS
// ----------------

let currentPlayer=0;

// ----------------
// LANZAR DADO
// ----------------

function rollDice(){

let frames=0;

function spin(){

dice.rotation.x+=0.2;
dice.rotation.y+=0.2;

frames++;

if(frames<40){

requestAnimationFrame(spin);

}else{

const result=Math.floor(Math.random()*6)+1;

movePlayer(result);

}

}

spin();

}

// ----------------
// MOVIMIENTO
// ----------------

function movePlayer(steps){

const player=currentPlayer===0?player1:player2;

let target=positions[currentPlayer]+steps;

if(target>=tiles.length) target=tiles.length-1;

positions[currentPlayer]=target;

const tile=tiles[target];

tile.material.color.set(
currentPlayer===0?0x00aa00:0xaa0000
);

const startX=player.position.x;
const startZ=player.position.z;

const endX=tile.position.x;
const endZ=tile.position.z;

let p=0;

function anim(){

p+=0.04;

player.position.x=startX+(endX-startX)*p;
player.position.z=startZ+(endZ-startZ)*p;

if(p<1){

requestAnimationFrame(anim);

}else{

resolveTile(target);

}

}

anim();

}

// ----------------
// EVENTOS CASILLA
// ----------------

function resolveTile(tileIndex){

const type=tileTypes[tileIndex];

if(type==="expense"){

money[currentPlayer]-=500;

}

if(type==="income"){

money[currentPlayer]+=800;

}

if(type==="investment"){

passive[currentPlayer]+=100;

}

resolveTurn();

}

// ----------------
// FIN TURNO
// ----------------

function resolveTurn(){

money[currentPlayer]+=salary[currentPlayer];
money[currentPlayer]+=passive[currentPlayer];
money[currentPlayer]-=expenses[currentPlayer];

updateUI();

switchTurn();

}

// ----------------
// IA
// ----------------

function aiTurn(){

setTimeout(()=>{
rollDice();
},1000);

}

// ----------------
// CAMBIO TURNO
// ----------------

function switchTurn(){

currentPlayer=currentPlayer===0?1:0;

document.getElementById("turn").innerText=
currentPlayer===0?"Jugador 1":"Jugador 2";

if(currentPlayer===1) aiTurn();

}

// ----------------
// UI
// ----------------

function updateUI(){

document.getElementById("money1").innerText=money[0];
document.getElementById("money2").innerText=money[1];

}

// ----------------
// LOOP
// ----------------

function animate(){

requestAnimationFrame(animate);

renderer.render(scene,camera);

}

animate();

</script>

</body>
</html>
