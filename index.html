<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Trapecios Cashflow</title>

<style>
body{
margin:0;
overflow:hidden;
background:white;
}
</style>

</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

/* ======================
ESCENA
====================== */

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xffffff);

/* ======================
CAMARA
====================== */

const camera = new THREE.PerspectiveCamera(
60,
window.innerWidth/window.innerHeight,
0.1,
1000
);

camera.position.set(0,12,16);
camera.lookAt(0,0,0);

/* ======================
RENDER
====================== */

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

/* ======================
LUCES
====================== */

scene.add(new THREE.AmbientLight(0xffffff,0.9));

const light = new THREE.DirectionalLight(0xffffff,0.6);
light.position.set(10,20,10);
scene.add(light);

/* ======================
COLORES
====================== */

function tileColor(type){

switch(type){

case "payday": return 0x2ecc71;
case "smallDeal": return 0x3498db;
case "bigDeal": return 0x9b59b6;
case "market": return 0xf1c40f;
case "charity": return 0xffffff;
case "doodad": return 0xe74c3c;

default: return 0x888888;

}

}

/* ======================
TIPO RANDOM
====================== */

function randomTileType(){

const r=Math.random();

if(r<0.2) return "payday";
if(r<0.45) return "smallDeal";
if(r<0.6) return "bigDeal";
if(r<0.75) return "market";
if(r<0.9) return "doodad";

return "charity";

}

/* ======================
TRAPECIO
====================== */

function createTrapezoid(type){

const group = new THREE.Group();

const widthFront = 2;
const widthBack = 1.2;
const length = 3;
const height = 0.5;

/* cuerpo del trapecio */

const shape = new THREE.Shape();

shape.moveTo(-widthFront/2,-length/2);
shape.lineTo(widthFront/2,-length/2);
shape.lineTo(widthBack/2,length/2);
shape.lineTo(-widthBack/2,length/2);

const geometry = new THREE.ExtrudeGeometry(shape,{
depth:height,
bevelEnabled:false
});

geometry.rotateX(-Math.PI/2);

const material = new THREE.MeshLambertMaterial({
color:tileColor(type)
});

const body = new THREE.Mesh(geometry,material);

group.add(body);

/* ======================
TEXTO EXTERIOR
====================== */

const canvas = document.createElement("canvas");
canvas.width = 256;
canvas.height = 128;

const ctx = canvas.getContext("2d");

ctx.fillStyle = tileColor(type).toString(16) === "ffffff" ? "#ffffff" : "#ffffff";
ctx.fillRect(0,0,256,128);

ctx.fillStyle="black";
ctx.font="bold 36px Arial";
ctx.textAlign="center";
ctx.textBaseline="middle";

ctx.fillText(type.toUpperCase(),128,64);

const texture = new THREE.CanvasTexture(canvas);

const labelMaterial = new THREE.MeshBasicMaterial({
map:texture,
transparent:false
});

const labelGeometry = new THREE.PlaneGeometry(2,1);

const label = new THREE.Mesh(labelGeometry,labelMaterial);

/* posición en la cara frontal */

label.position.set(0,0.6,length/2 + 0.02);

group.add(label);

return group;

}

/* ======================
CIRCULO
====================== */

const tileCount = 24;
const radius = 8;

for(let i=0;i<tileCount;i++){

const angle = i/tileCount*Math.PI*2;

const type = randomTileType();

const tile = createTrapezoid(type);

tile.position.x = Math.cos(angle)*radius;
tile.position.z = Math.sin(angle)*radius;

tile.rotation.y = -angle + Math.PI/2;

scene.add(tile);

}

/* ======================
LOOP
====================== */

function animate(){

requestAnimationFrame(animate);
renderer.render(scene,camera);

}

animate();

</script>

</body>
</html>
