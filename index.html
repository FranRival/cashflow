<!DOCTYPE html>
<html>
<head>
  <title>Cashflow MVP 3D</title>
  <style>
    body { margin:0; overflow:hidden; background:#111; }
    #ui {
      position:absolute;
      top:20px;
      left:20px;
      color:white;
      font-family:Arial;
    }
    button {
      padding:10px;
      margin-top:10px;
      font-size:16px;
    }
  </style>
</head>
<body>

<div id="ui">
  <div>Turno: <span id="turn">Jugador 1</span></div>
  <button onclick="rollDice()">Lanzar Dado</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

// ============================
// ESCENA BÁSICA
// ============================

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x202020);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0, 15, 20);
camera.lookAt(0,0,0);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Luz
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(10,20,10);
scene.add(light);

// ============================
// TABLERO (CUADROS)
// ============================

const tiles = [];
const tileSize = 2;
const totalTiles = 20;

for (let i = 0; i < totalTiles; i++) {
  const geometry = new THREE.BoxGeometry(tileSize, 0.5, tileSize);
  const material = new THREE.MeshStandardMaterial({color:0x555555});
  const tile = new THREE.Mesh(geometry, material);

  tile.position.x = (i - totalTiles/2) * (tileSize + 0.2);
  tile.position.y = 0;

  scene.add(tile);
  tiles.push(tile);
}

// ============================
// JUGADORES (ESFERAS)
// ============================

function createPlayer(color) {
  const geometry = new THREE.SphereGeometry(0.7, 32, 32);
  const material = new THREE.MeshStandardMaterial({color});
  const sphere = new THREE.Mesh(geometry, material);
  sphere.position.y = 1;
  scene.add(sphere);
  return sphere;
}

const player1 = createPlayer(0x00ff00);
const player2 = createPlayer(0xff0000);

let positions = [0, 0];
let currentPlayer = 0;

// ============================
// DADO + MOVIMIENTO
// ============================

function rollDice() {
  const dice = Math.floor(Math.random() * 6) + 1;
  movePlayer(dice);
}

function movePlayer(steps) {

  const player = currentPlayer === 0 ? player1 : player2;

  let target = positions[currentPlayer] + steps;
  if (target >= totalTiles) target = totalTiles - 1;

  positions[currentPlayer] = target;

  const tile = tiles[target];

  // Cambiar color del cuadro
  tile.material.color.set(currentPlayer === 0 ? 0x00aa00 : 0xaa0000);

  // Animación simple
  const startX = player.position.x;
  const endX = tile.position.x;

  let progress = 0;

  function animateMove() {
    progress += 0.02;
    player.position.x = startX + (endX - startX) * progress;

    if (progress < 1) {
      requestAnimationFrame(animateMove);
    } else {
      switchTurn();
    }
  }

  animateMove();
}

function switchTurn() {
  currentPlayer = currentPlayer === 0 ? 1 : 0;
  document.getElementById("turn").innerText =
    currentPlayer === 0 ? "Jugador 1" : "Jugador 2";
}

// ============================
// LOOP
// ============================

function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}

animate();

</script>

</body>
</html>
